# =============================================================================
# Forge AI — Render Blueprint
# Single Node web service (Next.js monorepo) + managed Postgres.
# Deploy: push to GitHub, then in Render → New → Blueprint → pick this repo.
# Docs: https://render.com/docs/blueprint-spec
# =============================================================================

databases:
  - name: forge-ai-db
    databaseName: forge_ai
    user: forge_ai
    plan: free
    region: singapore

services:
  - type: web
    name: forge-ai-web
    runtime: node
    plan: free
    region: singapore
    # Build the whole monorepo, push the Prisma schema to the fresh DB,
    # then build the Next.js app. (db push, not migrate deploy — there are
    # no migration files; the schema is the source of truth.)
    buildCommand: >-
      corepack enable &&
      pnpm install --frozen-lockfile=false --prod=false &&
      pnpm --filter @forge-ai/db exec prisma generate &&
      pnpm --filter @forge-ai/db exec prisma db push --skip-generate &&
      pnpm --filter @forge-ai/web build
    # Start Next.js directly via node — NOT through pnpm. Going through pnpm
    # makes Corepack try to download pnpm at boot and hang on its confirm
    # prompt, so no port ever opens and Render times out the deploy.
    startCommand: node apps/web/node_modules/next/dist/bin/next start apps/web
    healthCheckPath: /
    autoDeploy: true
    envVars:
      # --- Runtime ---------------------------------------------------------
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
      # Never let Corepack block on an interactive download prompt (it would
      # hang the build or boot forever on the free instance).
      - key: COREPACK_ENABLE_DOWNLOAD_PROMPT
        value: "0"

      # --- Database (wired automatically from the managed Postgres above) ---
      - key: DATABASE_URL
        fromDatabase:
          name: forge-ai-db
          property: connectionString
      - key: DIRECT_URL
        fromDatabase:
          name: forge-ai-db
          property: connectionString

      # --- App URLs --------------------------------------------------------
      # Render serves this service at https://<name>.onrender.com.
      # If your final URL differs, update all three values, then redeploy.
      - key: NEXT_PUBLIC_APP_URL
        value: https://forge-ai-web.onrender.com
      - key: BETTER_AUTH_URL
        value: https://forge-ai-web.onrender.com

      # --- Auth secrets (auto-generated; no action needed) -----------------
      - key: BETTER_AUTH_SECRET
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: GITHUB_WEBHOOK_SECRET
        generateValue: true
      # Shared secret for the inbound /api/ingest endpoint (ticket/email
      # ingestion). Retrieve the generated value from the Render dashboard to
      # send it in the `x-forge-ingest-secret` header.
      - key: INGEST_SECRET
        generateValue: true

      # --- GitHub OAuth (fill in the Render dashboard) ---------------------
      # Callback URL: https://forge-ai-web.onrender.com/api/auth/callback/github
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false

      # --- Mistral AI (fill in the Render dashboard) -----------------------
      - key: MISTRAL_API_KEY
        sync: false

      # --- Inngest (fill in the Render dashboard) --------------------------
      # From https://app.inngest.com → Settings → Keys (production env)
      - key: INNGEST_EVENT_KEY
        sync: false
      - key: INNGEST_SIGNING_KEY
        sync: false

      # --- Razorpay billing (fill in the Render dashboard) -----------------
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: RAZORPAY_PLAN_PRO
        sync: false
      - key: RAZORPAY_PLAN_TEAM
        sync: false
      - key: NEXT_PUBLIC_RAZORPAY_KEY_ID
        sync: false
